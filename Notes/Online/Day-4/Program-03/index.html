<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain DP: The Row Alignment Mystery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .canvas-container { height: 400px; border-radius: 20px; background: #0f172a; border: 1px solid #1e293b; }
        .grid-cell { width: 50px; height: 50px; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .row-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 4px; border-radius: 8px; overflow: hidden; }
        .active-row { outline: 4px solid #38bdf8; transform: translateX(10px); z-index: 10; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .match-row { background: rgba(34, 197, 94, 0.2); border: 2px solid #22c55e; }
        .complement-row { background: rgba(168, 85, 247, 0.2); border: 2px solid #a855f7; }
        .val-0 { background: #1e293b; color: #64748b; }
        .val-1 { background: #f8fafc; color: #0f172a; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-8">

<script>
    // --- 🛠️ PROBLEM DATA INJECTION 🛠️ ---
    const PROBLEM_DATA = {
        grid: [
            [1, 1, 0],
            [0, 0, 1],
            [1, 1, 0]
        ],
        n: 3, m: 3
    };

    function calculateSteps() {
        const { grid, n, m } = PROBLEM_DATA;
        const steps = [];
        let rowCounts = {};
        let maxIdentical = 0;

        // Logic: Two rows can be made identical if they are already the same,
        // or if one is the exact inverse (flipped version) of the other.
        for (let i = 0; i < n; i++) {
            let row = grid[i];
            
            // "Normalize" the row: if it starts with 0, keep it. 
            // If it starts with 1, flip the whole row for comparison.
            let normalized = row[0] === 0 ? [...row] : row.map(bit => 1 - bit);
            let key = normalized.join('');
            
            rowCounts[key] = (rowCounts[key] || 0) + 1;
            maxIdentical = Math.max(maxIdentical, rowCounts[key]);

            steps.push({
                rowIndex: i,
                currentRow: row,
                normalized: normalized,
                counts: {...rowCounts},
                maxSoFar: maxIdentical,
                explanation: row[0] === 1 
                    ? `Row ${i} starts with 1. Captain DP flips it to see its 'True Shape': [${normalized.join(', ')}].`
                    : `Row ${i} starts with 0. It's already in its 'True Shape': [${normalized.join(', ')}].`,
            });
        }
        return steps;
    }
</script>

<div class="max-w-6xl mx-auto space-y-8">
    <header class="flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter">Row Aligner 3000</h1>
            <p class="text-slate-400 mt-2 font-medium">Captain DP's Hidden Similarity Detector</p>
        </div>
        <div id="step-tag" class="px-4 py-1 bg-blue-500/10 border border-blue-500/50 text-blue-400 rounded-full font-mono text-sm">Step 0 / 0</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">3D Pattern Structure</h2>
            <div id="three-container" class="canvas-container"></div>
        </div>

        <div class="glass p-6 rounded-3xl">
            <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">Row Shape Comparison</h2>
            <div id="grid-2d" class="flex flex-col space-y-2">
                </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
        <div class="md:col-span-2 glass p-8 rounded-3xl flex flex-col gap-6">
            <div id="logic-box" class="text-lg font-medium text-slate-200">Initiating scan...</div>
            <div class="flex items-center gap-6">
                <button onclick="prevStep()" class="w-12 h-12 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition-all shadow-xl"><i data-lucide="arrow-left"></i></button>
                <input type="range" id="progress-slider" class="flex-grow h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500" min="0" value="0">
                <button onclick="nextStep()" class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-all shadow-xl shadow-blue-500/20"><i data-lucide="arrow-right"></i></button>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl border-r-4 border-emerald-500">
            <div class="text-xs font-bold text-slate-500 uppercase mb-2">Max Identical Rows</div>
            <div id="max-display" class="text-6xl font-black text-emerald-400 italic">0</div>
        </div>
    </div>
</div>

<script>
    let currentIdx = -1;
    const steps = calculateSteps();
    const slider = document.getElementById('progress-slider');
    slider.max = steps.length - 1;

    // --- Three.js Setup ---
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const group = new THREE.Group();
    const rowMeshes = [];

    function init3D() {
        const { grid, n, m } = PROBLEM_DATA;
        for(let i=0; i<n; i++) {
            const rowGroup = new THREE.Group();
            for(let j=0; j<m; j++) {
                const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const mat = new THREE.MeshPhongMaterial({ color: grid[i][j] === 1 ? 0xffffff : 0x334155 });
                const cube = new THREE.Mesh(geo, mat);
                cube.position.set(j - m/2, 0, 0);
                rowGroup.add(cube);
            }
            rowGroup.position.set(0, (n/2 - i) * 1.2, 0);
            group.add(rowGroup);
            rowMeshes.push(rowGroup);
        }
        scene.add(group);
        const light = new THREE.SpotLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));
        camera.position.z = 8;
    }

    function updateUI() {
        if (currentIdx < 0) return;
        const step = steps[currentIdx];
        
        // 2D Update
        const grid2d = document.getElementById('grid-2d');
        grid2d.innerHTML = '';
        PROBLEM_DATA.grid.forEach((row, idx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = `row-container flex ${idx === step.rowIndex ? 'active-row' : ''}`;
            
            // Logic for highlighting similarity
            const currentNorm = JSON.stringify(step.normalized);
            const rowNorm = JSON.stringify(row[0] === 0 ? row : row.map(b => 1-b));
            if (currentIdx >= 0 && rowNorm === currentNorm) {
                rowDiv.classList.add('match-row');
            }

            row.forEach(val => {
                const cell = document.createElement('div');
                cell.className = `grid-cell val-${val}`;
                cell.innerText = val;
                rowDiv.appendChild(cell);
            });
            grid2d.appendChild(rowDiv);
        });

        // 3D Update
        rowMeshes.forEach((mesh, idx) => {
            if (idx === step.rowIndex) mesh.scale.set(1.1, 1.1, 1.1);
            else mesh.scale.set(1, 1, 1);
        });

        document.getElementById('logic-box').innerText = step.explanation;
        document.getElementById('max-display').innerText = step.maxSoFar;
        document.getElementById('step-tag').innerText = `Step ${currentIdx + 1} / ${steps.length}`;
        slider.value = currentIdx;
    }

    function nextStep() { if(currentIdx < steps.length-1) { currentIdx++; updateUI(); } }
    function prevStep() { if(currentIdx > 0) { currentIdx--; updateUI(); } }
    slider.oninput = (e) => { currentIdx = parseInt(e.target.value); updateUI(); };

    function animate() {
        requestAnimationFrame(animate);
        group.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    init3D();
    animate();
    lucide.createIcons();
</script>
</body>
</html>
