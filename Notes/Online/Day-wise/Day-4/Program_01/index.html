<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain DP's Diagonal Treasure Hunt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        body { background: #1a202c; color: white; font-family: 'Comic Sans MS', cursive, sans-serif; }
        .canvas-container { height: 400px; border-radius: 12px; overflow: hidden; background: #000; }
        .grid-cell { transition: all 0.3s ease; width: 40px; height: 40px; border: 1px solid #4a5568; }
        .active-cell { outline: 3px solid #f6e05e; z-index: 10; transform: scale(1.1); }
        .dependency-cell { background: #2d3748; outline: 2px dashed #63b3ed; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">

<script>
    const PROBLEM_DATA = {
        grid: [
            [3, 1, 3],
            [2, 1, 2],
            [3, 2, 3]
        ],
        n: 3, m: 3
    };

    /** * THE ENGINE: This generates the "Secret Diary" (Step-by-Step History)
     * For this diagonal water problem: 
     * Water escapes if it hits a boundary. A cell's "Max Exit Height" 
     * is the minimum of the paths available to it.
     */
    function calculateSteps() {
        const { grid, n, m } = PROBLEM_DATA;
        const steps = [];
        
        // DP Table: escapeHeight[i][j] = lowest wall on the path to escape
        let dp = Array.from({ length: n }, () => Array(m).fill(Infinity));
        let totalWater = 0;

        // Logic: Water at (i, j) can only flow to (i+1, j-1) and (i+1, j+1)
        // This means the "escape" actually happens at the bottom row or side edges.
        // We iterate backwards from the bottom to see what can reach the exit.
        
        for (let i = n - 1; i >= 0; i--) {
            for (let j = 0; j < m; j++) {
                let currentHeight = grid[i][j];
                let escapePathVal = Infinity;
                let dependencies = [];

                if (i === n - 1 || j === 0 || j === m - 1) {
                    // It's a boundary! Water escapes at its own height.
                    escapePathVal = currentHeight;
                } else {
                    // Check diagonal children
                    const dl = dp[i + 1][j - 1];
                    const dr = dp[i + 1][j + 1];
                    dependencies = [[i+1, j-1], [i+1, j+1]];
                    // The "bottleneck" to escape is the max of current vs best child path
                    escapePathVal = Math.max(currentHeight, Math.min(dl, dr));
                }

                dp[i][j] = escapePathVal;
                let trapped = Math.max(0, escapePathVal - currentHeight);
                totalWater += trapped;

                steps.push({
                    i, j,
                    val: currentHeight,
                    escapeVal: escapePathVal,
                    trappedSoFar: totalWater,
                    dependencies,
                    explanation: i === n-1 || j === 0 || j === m-1 
                        ? `Captain DP found an edge at (${i},${j})! Water escapes easily.`
                        : `At (${i},${j}), Captain DP checks the diagonals. The easiest escape path is ${Math.min(dp[i+1][j-1], dp[i+1][j+1])}.`,
                    currentDPState: JSON.parse(JSON.stringify(dp))
                });
            }
        }
        return steps;
    }
</script>

<div class="max-w-6xl mx-auto space-y-4">
    <header class="flex justify-between items-center bg-yellow-600 p-4 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold">⚓ Captain DP's Secret Diary</h1>
        <div id="progress-text" class="font-mono bg-black/20 px-3 py-1 rounded">Step: 0 / 0</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="glass-panel p-4 rounded-xl">
            <h2 class="mb-2 flex items-center gap-2"><i data-lucide="box"></i> 3D Treasure Map</h2>
            <div id="three-container" class="canvas-container"></div>
        </div>

        <div class="glass-panel p-4 rounded-xl">
            <h2 class="mb-2 flex items-center gap-2"><i data-lucide="layout-grid"></i> Secret Diary (DP Table)</h2>
            <div id="grid-2d" class="flex flex-col items-center justify-center p-4 bg-gray-900 rounded-lg overflow-auto">
                </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 glass-panel p-6 rounded-xl border-2 border-yellow-600">
            <div id="logic-box" class="text-xl mb-4 italic text-yellow-300">"Ahoy! Press Next to start the hunt!"</div>
            <div class="flex items-center gap-4">
                <button onclick="prevStep()" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-full font-bold transition">Back</button>
                <input type="range" id="progress-slider" class="flex-grow accent-yellow-500" min="0" value="0">
                <button onclick="nextStep()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-3 rounded-full font-bold transition">Next Step</button>
            </div>
        </div>
        
        <div class="glass-panel p-4 rounded-xl border border-blue-400">
            <h3 class="font-bold border-b border-blue-400 mb-2">Trace Table</h3>
            <div id="trace-table" class="space-y-1 text-sm font-mono">
                <div>i: - | j: -</div>
                <div>Height: -</div>
                <div>Escape H: -</div>
                <div class="text-blue-400 font-bold">Total Water: 0</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Simulator Engine Variables ---
    let currentStepIdx = -1;
    let steps = calculateSteps();
    const slider = document.getElementById('progress-slider');
    slider.max = steps.length - 1;

    // --- Three.js Setup ---
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const blocks = [];
    const group = new THREE.Group();

    function init3D() {
        const { grid, n, m } = PROBLEM_DATA;
        const spacing = 1.1;
        for(let i=0; i<n; i++) {
            blocks[i] = [];
            for(let j=0; j<m; j++) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(j * spacing - (m/2), 0, i * spacing - (n/2));
                cube.scale.y = grid[i][j] || 0.1;
                cube.position.y = cube.scale.y / 2;
                group.add(cube);
                blocks[i][j] = cube;
            }
        }
        scene.add(group);
        
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);
    }

    function update3D(step) {
        group.rotation.y += 0.01;
        if (!step) return;
        blocks.forEach((row, i) => row.forEach((cube, j) => {
            const isTrapped = step.currentDPState[i][j] !== Infinity && step.currentDPState[i][j] > PROBLEM_DATA.grid[i][j];
            cube.material.color.setHex(isTrapped ? 0x3182ce : 0x8b4513);
            if (i === step.i && j === step.j) cube.material.emissive.setHex(0x555500);
            else cube.material.emissive.setHex(0x000000);
        }));
    }

    // --- 2D UI Rendering ---
    function render2D() {
        const grid2d = document.getElementById('grid-2d');
        const { n, m } = PROBLEM_DATA;
        grid2d.style.gridTemplateColumns = `repeat(${m}, 40px)`;
        grid2d.innerHTML = '';

        for(let i=0; i<n; i++) {
            for(let j=0; j<m; j++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell flex items-center justify-center text-xs';
                cell.id = `cell-${i}-${j}`;
                const dpVal = currentStepIdx >= 0 ? steps[currentStepIdx].currentDPState[i][j] : '?';
                cell.innerHTML = dpVal === Infinity ? '∞' : dpVal;
                
                if (currentStepIdx >= 0) {
                    const step = steps[currentStepIdx];
                    if (i === step.i && j === step.j) cell.classList.add('active-cell');
                    step.dependencies.forEach(d => {
                        if (d[0] === i && d[1] === j) cell.classList.add('dependency-cell');
                    });
                }
                grid2d.appendChild(cell);
            }
        }
    }

    function updateUI() {
        const step = steps[currentStepIdx];
        if (!step) return;

        document.getElementById('progress-text').innerText = `Step: ${currentStepIdx + 1} / ${steps.length}`;
        document.getElementById('logic-box').innerText = step.explanation;
        document.getElementById('trace-table').innerHTML = `
            <div>i: ${step.i} | j: ${step.j}</div>
            <div>Height: ${step.val}</div>
            <div>Escape H: ${step.escapeVal === Infinity ? 'Searching...' : step.escapeVal}</div>
            <div class="text-blue-400 font-bold">Total Water: ${step.trappedSoFar}</div>
        `;
        slider.value = currentStepIdx;
        render2D();
    }

    function nextStep() {
        if (currentStepIdx < steps.length - 1) {
            currentStepIdx++;
            updateUI();
        }
    }

    function prevStep() {
        if (currentStepIdx > 0) {
            currentStepIdx--;
            updateUI();
        }
    }

    slider.oninput = (e) => {
        currentStepIdx = parseInt(e.target.value);
        updateUI();
    };

    // --- Loop ---
    function animate() {
        requestAnimationFrame(animate);
        update3D(steps[currentStepIdx]);
        renderer.render(scene, camera);
    }

    init3D();
    render2D();
    animate();
    lucide.createIcons();
</script>
</body>
</html>
